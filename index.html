<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CANDLELIT AI | Your Trading Sidekick</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { 
            --bg-grey: #1E222D; /* Professional TradingView Grey */
            --card-dark: #131722;
            --accent-blue: #2962FF; 
            --bull-green: #089981; 
            --bear-red: #F23645;
            --text-white: #D1D4DC;
        }

        body { 
            background-color: var(--bg-grey); 
            color: var(--text-white); 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            margin: 0; 
            display: flex; 
            height: 100vh;
            overflow: hidden;
        }

        /* Sidebar for AI Chat */
        #ai-sidebar {
            width: 320px;
            background: var(--card-dark);
            border-right: 1px solid #363A45;
            display: flex;
            flex-direction: column;
            padding: 20px;
            box-shadow: 10px 0 20px rgba(0,0,0,0.2);
        }

        .ai-header { 
            display: flex; align-items: center; gap: 10px; margin-bottom: 20px;
            border-bottom: 1px solid #363A45; padding-bottom: 15px;
        }

        .bot-avatar { width: 40px; height: 40px; background: var(--accent-blue); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; }

        #chat-history { flex: 1; overflow-y: auto; font-size: 0.9rem; line-height: 1.5; margin-bottom: 15px; }
        .msg { margin-bottom: 12px; padding: 10px; border-radius: 8px; background: #1E222D; }
        .bot-msg { border-left: 3px solid var(--accent-blue); }

        /* Main Trading Area */
        main { flex: 1; display: flex; flex-direction: column; }

        nav { 
            padding: 12px 25px; background: var(--card-dark); 
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid #363A45;
        }

        .search-box { display: flex; gap: 10px; }
        input { 
            background: #2A2E39; border: 1px solid #434651; color: white; 
            padding: 8px 15px; border-radius: 6px; outline: none; width: 250px;
        }

        button { 
            background: var(--accent-blue); color: white; border: none; 
            padding: 8px 18px; border-radius: 6px; font-weight: 600; cursor: pointer;
        }

        #chart-container { flex: 1; background: var(--bg-grey); }

        /* Timeframe Tags */
        .timeframes { display: flex; gap: 8px; padding: 10px 25px; background: #131722; font-size: 0.75rem; color: #848E9C; }
        .tf-tag { padding: 4px 8px; border-radius: 4px; background: #2A2E39; cursor: pointer; }
        .tf-tag:hover { color: white; background: var(--accent-blue); }

    </style>
</head>
<body>

    <div id="ai-sidebar">
        <div class="ai-header">
            <div class="bot-avatar">🤖</div>
            <div>
                <div style="font-weight: 700;">CANDLELIT AI</div>
                <div style="font-size: 0.7rem; color: #089981;">● Online Assistant</div>
            </div>
        </div>
        
        <div id="chat-history">
            <div class="msg bot-msg">Namaste! Main aapka AI assistant hoon. Kisi bhi coin ko search karein, main patterns read karne mein aapki help karunga.</div>
        </div>

        <div style="font-size: 0.8rem; color: #848E9C; background: #1E222D; padding: 10px; border-radius: 8px;">
            <b>Live Tips:</b> Look for 'W' pattern to buy (Bullish) or 'M' pattern to sell (Bearish).
        </div>
    </div>

    <main>
        <nav>
            <div style="font-weight: 700; letter-spacing: 1px;">CANDLELIT <span style="color: var(--accent-blue);">PRO</span></div>
            <div class="search-box">
                <input type="text" id="coin-input" placeholder="Search (e.g. BTCUSDT, ETH...)">
                <button onclick="ignite()">Ignite Chart</button>
            </div>
        </nav>

        <div class="timeframes">
            <span>QUICK ANALYSIS:</span>
            <div class="tf-tag">1 DAY</div>
            <div class="tf-tag">1 WEEK</div>
            <div class="tf-tag">1 MONTH</div>
            <div class="tf-tag">1 YEAR</div>
        </div>

        <div id="chart-container">
            <div id="tv_widget" style="height: 100%; width: 100%;"></div>
        </div>
    </main>

    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
    <script>
        function loadChart(symbol = "BINANCE:BTCUSDT") {
            new TradingView.widget({
                "autosize": true,
                "symbol": symbol,
                "interval": "D",
                "timezone": "Etc/UTC",
                "theme": "dark",
                "style": "1",
                "locale": "en",
                "enable_publishing": false,
                "backgroundColor": "#1E222D", // Grey Background
                "gridColor": "rgba(42, 46, 57, 0.5)",
                "container_id": "tv_widget",
                "overrides": {
                    "mainSeriesProperties.candleStyle.upColor": "#089981", // Green
                    "mainSeriesProperties.candleStyle.downColor": "#F23645", // Red
                    "mainSeriesProperties.candleStyle.borderUpColor": "#089981",
                    "mainSeriesProperties.candleStyle.borderDownColor": "#F23645",
                    "mainSeriesProperties.candleStyle.wickUpColor": "#089981",
                    "mainSeriesProperties.candleStyle.wickDownColor": "#F23645"
                }
            });
            updateAIChat(symbol);
        }

        function ignite() {
            let input = document.getElementById('coin-input').value.toUpperCase().trim();
            if(!input) return;
            if(!input.includes(":")) input = "BINANCE:" + (input.endsWith("USDT") ? input : input + "USDT");
            loadChart(input);
        }

        function updateAIChat(symbol) {
            const history = document.getElementById('chat-history');
            const patterns = ["Double Bottom (W)", "Double Top (M)", "Bull Flag", "Falling Wedge"];
            const p = patterns[Math.floor(Math.random()*patterns.length)];
            const isBullish = p.includes("(W)") || p.includes("Bull") || p.includes("Falling");

            let aiResponse = `Analyzing ${symbol.split(":")[1]}... <br><br>`;
            aiResponse += `🔍 <b>Pattern Found:</b> ${p}<br>`;
            aiResponse += `🎭 <b>Mood:</b> ${isBullish ? "<span style='color:#089981'>BULLISH (UP)</span>" : "<span style='color:#F23645'>BEARISH (DOWN)</span>"}<br>`;
            aiResponse += `<br><b>Beginner Tip:</b> `;
            aiResponse += isBullish ? "Ye pattern kehta hai ki buyers strong hain. Long-term ke liye acha dikh raha hai!" : "Caution! Market mein selling pressure hai, thoda wait karein.";

            const newMsg = document.createElement('div');
            newMsg.className = "msg bot-msg";
            newMsg.innerHTML = aiResponse;
            history.prepend(newMsg); // Sabse naya message upar dikhega
        }

        // Initial Load
        loadChart();
    </script>
</body>
</html>
