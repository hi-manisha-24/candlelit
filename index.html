<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CANDLELIT 🕯️ | Read the Light</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root { --amber: #FFB347; --dark: #0A0A0A; --border: #332211; }
        body { background: var(--dark); color: var(--amber); font-family: 'Cormorant Garamond', serif; margin: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        
        header { padding: 40px 20px; text-align: center; }
        .candle { font-size: 3rem; animation: flicker 2s infinite alternate; }
        @keyframes flicker { 0% { opacity: 0.7; } 100% { opacity: 1; text-shadow: 0 0 20px var(--amber); } }
        
        h1 { margin: 10px 0; letter-spacing: 6px; font-size: 2.5rem; }
        .motto { font-style: italic; opacity: 0.6; margin-bottom: 20px; }

        .container { width: 90%; max-width: 500px; border: 1px solid var(--border); padding: 30px; background: #0f0f0f; border-radius: 8px; box-shadow: 0 15px 50px rgba(0,0,0,0.9); }
        
        .watchlist { display: flex; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; justify-content: center; }
        .chip { border: 1px solid #444; padding: 6px 14px; border-radius: 20px; font-size: 0.85rem; cursor: pointer; transition: 0.3s; }
        .chip:hover { border-color: var(--amber); background: rgba(255,179,71,0.1); }

        input { background: #000; color: var(--amber); border: 1px solid var(--border); padding: 15px; width: 100%; box-sizing: border-box; font-size: 1.1rem; margin-bottom: 15px; text-align: center; border-radius: 4px; }
        
        button { background: transparent; color: var(--amber); border: 1px solid var(--amber); padding: 15px; width: 100%; cursor: pointer; font-size: 1.2rem; transition: 0.4s; letter-spacing: 3px; font-weight: bold; text-transform: uppercase; }
        button:hover { background: var(--amber); color: #000; box-shadow: 0 0 25px rgba(255,179,71,0.4); }

        #price-display { font-size: 3.5rem; text-align: center; margin: 30px 0; font-weight: 700; letter-spacing: -1px; }
        
        .alert-box { border-top: 1px solid #222; margin-top: 25px; padding-top: 20px; text-align: center; }
        #a-status { font-size: 0.9rem; color: #888; margin-top: 10px; font-style: italic; }

        /* Small bar chart decoration */
        .chart-visual { height: 60px; display: flex; align-items: flex-end; gap: 4px; margin: 20px 0; opacity: 0.3; }
        .bar { flex: 1; background: var(--amber); border-radius: 2px 2px 0 0; }
    </style>
</head>
<body>

<header>
    <div class="candle">🕯️</div>
    <h1>CANDLELIT</h1>
    <div class="motto">"Read the light. Know the market."</div>
</header>

<div class="container">
    <div class="watchlist" id="watchlist"></div>
    
    <input type="text" id="symbol" placeholder="ENTER SYMBOL (eg: bitcoin, ethereum, solana)">
    <button onclick="ignite()">IGNITE →</button>

    <div id="price-display">$0.00</div>
    
    <div class="chart-visual" id="chart"></div>

    <div class="alert-box">
        <input type="number" id="alert-price" placeholder="SET ALERT PRICE ($)">
        <button onclick="setAlert()" style="font-size: 0.9rem; padding: 10px;">Set Alert 🔔</button>
        <div id="a-status">No active alerts</div>
    </div>
</div>

<script>
    let watchlist = JSON.parse(localStorage.getItem('cand_wl')) || ['bitcoin', 'ethereum', 'solana'];
    let targetPrice = null;

    function renderWL() {
        const wlBox = document.getElementById('watchlist');
        wlBox.innerHTML = watchlist.map(s => `<div class="chip" onclick="load('${s}')">${s.toUpperCase()}</div>`).join('');
    }

    function load(s) {
        document.getElementById('symbol').value = s;
        ignite();
    }

    async function ignite() {
        const rawSymbol = document.getElementById('symbol').value.toLowerCase().trim();
        // Simple mapping for common tickers to CoinGecko IDs
        const mapping = { 'btc': 'bitcoin', 'eth': 'ethereum', 'sol': 'solana', 'doge': 'dogecoin' };
        const symbol = mapping[rawSymbol] || rawSymbol;

        // Add to watchlist if not there
        if(!watchlist.includes(symbol) && symbol !== "") {
            watchlist.push(symbol);
            localStorage.setItem('cand_wl', JSON.stringify(watchlist));
            renderWL();
        }

        try {
            const response = await fetch(`https://api.coingecko.com/api/v3/simple/price?ids=${symbol}&vs_currencies=usd`);
            const data = await response.json();
            
            if(data[symbol]) {
                const price = data[symbol].usd;
                document.getElementById('price-display').innerText = `$${price.toLocaleString()}`;
                animateChart();
                checkAlert(price, symbol);
            } else {
                document.getElementById('price-display').innerText = "NOT FOUND";
            }
        } catch (e) {
            document.getElementById('price-display').innerText = "ERROR";
        }
    }

    function animateChart() {
        const chart = document.getElementById('chart');
        chart.innerHTML = '';
        for(let i=0; i<20; i++) {
            const h = Math.random() * 100;
            chart.innerHTML += `<div class="bar" style="height: ${h}%"></div>`;
        }
    }

    function setAlert() {
        targetPrice = parseFloat(document.getElementById('alert-price').value);
        if(!isNaN(targetPrice)) {
            document.getElementById('a-status').innerText = `Watching for $${targetPrice}`;
        }
    }

    function checkAlert(currentPrice, name) {
        if(targetPrice && currentPrice >= targetPrice) {
            alert(`🕯️ CANDLELIT ALERT: ${name.toUpperCase()} has reached $${currentPrice}!`);
            targetPrice = null;
            document.getElementById('a-status').innerText = "Alert triggered.";
        }
    }

    // Initialize
    renderWL();
    // Auto-update price every 20 seconds
    setInterval(() => {
        if(document.getElementById('symbol').value !== "") ignite();
    }, 20000);
</script>

</body>
</html>
