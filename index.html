<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CANDLELIT APM | Strategy & Analysis</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root { --bull: #00ff88; --bear: #ff4444; --amber: #FFB347; --bg: #050505; }
        body { background: var(--bg); color: #fff; font-family: 'Inter', sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        /* APM Header Branding */
        header { 
            background: #0a0a0a; border-bottom: 1px solid #222; 
            padding: 10px 25px; display: flex; align-items: center; justify-content: space-between;
        }
        .brand { font-family: 'Cormorant Garamond', serif; color: var(--amber); font-size: 1.5rem; letter-spacing: 2px; }
        
        .search-area { display: flex; gap: 10px; }
        input { background: #111; border: 1px solid #333; color: white; padding: 8px 15px; border-radius: 5px; outline: none; }
        button { background: var(--amber); border: none; padding: 8px 20px; font-weight: 600; cursor: pointer; border-radius: 5px; }

        /* The Strategy Panel */
        #verdict-panel {
            background: #0f0f0f; border-top: 1px solid #222;
            padding: 15px 25px; display: flex; justify-content: space-around; align-items: center;
        }
        .indicator { text-align: center; }
        .label { font-size: 0.7rem; text-transform: uppercase; color: #888; letter-spacing: 1px; }
        .value { font-size: 1.1rem; font-weight: 600; margin-top: 5px; }
        .bullish { color: var(--bull); }
        .bearish { color: var(--bear); }

        #chart-box { flex-grow: 1; position: relative; }
    </style>
</head>
<body>

<header>
    <div class="brand">🕯️ CANDLELIT <span style="font-size: 0.7rem; opacity: 0.5;">PROTOTYPE v2.0</span></div>
    <div class="search-area">
        <input type="text" id="symbol-input" placeholder="BTCUSDT, ETHUSDT...">
        <button onclick="updateChart()">IGNITE →</button>
    </div>
</header>

<div id="chart-box">
    <div id="tv_chart_container" style="height: 100%; width: 100%;"></div>
</div>

<div id="verdict-panel">
    <div class="indicator">
        <div class="label">Primary Pattern</div>
        <div id="pattern-type" class="value">Analyzing Candles...</div>
    </div>
    <div class="indicator">
        <div class="label">Long-Term Mood</div>
        <div id="mood-type" class="value">Neutral</div>
    </div>
    <div class="indicator">
        <div class="label">APM Recommendation</div>
        <div id="rec-type" class="value">Waiting for Signal</div>
    </div>
</div>

<script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
<script>
    let currentSymbol = "BINANCE:BTCUSDT";

    function initChart(symbol) {
        new TradingView.widget({
            "autosize": true,
            "symbol": symbol,
            "interval": "D",
            "timezone": "Etc/UTC",
            "theme": "dark",
            "style": "1",
            "locale": "en",
            "toolbar_bg": "#f1f3f6",
            "enable_publishing": false,
            "withdateranges": true,
            "hide_side_toolbar": false,
            "allow_symbol_change": true,
            "container_id": "tv_chart_container"
        });
        generateFakeVerdict(symbol);
    }

    function updateChart() {
        let sym = document.getElementById('symbol-input').value.toUpperCase();
        if(!sym.includes(":")) sym = "BINANCE:" + sym;
        if(!sym.endsWith("T") && !sym.includes("USD")) sym += "USDT";
        currentSymbol = sym;
        initChart(sym);
    }

    // Logic to simulate pattern reading for the UI
    function generateFakeVerdict(symbol) {
        const patterns = ["Double Bottom (W)", "Double Top (M)", "Ascending Triangle", "Hammer Reversal", "Head & Shoulders"];
        const moods = ["Bullish", "Bearish", "Consolidating"];
        
        const randomPattern = patterns[Math.floor(Math.random() * patterns.length)];
        const randomMood = moods[Math.floor(Math.random() * moods.length)];

        const pEl = document.getElementById('pattern-type');
        const mEl = document.getElementById('mood-type');
        const rEl = document.getElementById('rec-type');

        pEl.innerText = randomPattern;
        mEl.innerText = randomMood;
        
        if(randomMood === "Bullish") {
            mEl.className = "value bullish";
            rEl.innerText = "ACCUMULATE";
            rEl.style.color = "#00ff88";
        } else if (randomMood === "Bearish") {
            mEl.className = "value bearish";
            rEl.innerText = "STAY LIQUID";
            rEl.style.color = "#ff4444";
        } else {
            mEl.className = "value";
            rEl.innerText = "WAIT FOR BREAKOUT";
            rEl.style.color = "#888";
        }
    }

    // Initial Start
    initChart(currentSymbol);
</script>
</body>
</html>
