<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Candlelit AI</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: 'Poppins', sans-serif;
      background: #0d0d0d;
      color: #fff;
    }

    .container {
      padding: 20px;
      max-width: 1100px;
      margin: auto;
    }

    h1, h2 {
      margin-bottom: 10px;
    }

    .card {
      background: #1a1a1a;
      padding: 20px;
      border-radius: 12px;
      margin-bottom: 20px;
    }

    .bullish { color: #00ff9c; }
    .bearish { color: #ff4d4d; }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 15px;
    }

    .coin {
      background: #222;
      padding: 15px;
      border-radius: 10px;
      transition: 0.3s;
    }

    .coin:hover {
      transform: scale(1.05);
    }

    .news-item {
      padding: 10px 0;
      border-bottom: 1px solid #333;
    }

    .tag {
      font-size: 12px;
      padding: 3px 8px;
      border-radius: 6px;
      margin-left: 10px;
    }

    .green { background: #003d2e; }
    .red { background: #3d0000; }

    button {
      padding: 10px 20px;
      background: orange;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      margin-top: 10px;
    }
  </style>
</head>

<body>
<div class="container">

  <!-- HERO -->
  <div class="card">
    <h1>🔥 BTC: <span class="bullish">BULLISH (78%)</span></h1>
    <p>+2.4% price | Volume rising | Positive sentiment</p>
    <button>View Full Market →</button>
  </div>

  <!-- MARKET MOOD -->
  <div class="card">
    <h2>🌍 Market Mood: <span class="bullish">Bullish</span></h2>
    <p>Top Gainers: ETH +4.2%, SOL +6.1%</p>
    <p>Top Losers: XRP -2.3%</p>
  </div>

  <!-- COINS -->
  <div class="card">
    <h2>💰 Top Coins</h2>
    <div class="grid" id="coins"></div>
  </div>

  <!-- NEWS -->
  <div class="card">
    <h2>📰 Latest News</h2>
    <div id="news"></div>
  </div>

</div>

<script>
const coins = [
  { name: "BTC", price: "₹58,00,000", change: 2.4 },
  { name: "ETH", price: "₹3,20,000", change: -1.2 },
  { name: "SOL", price: "₹12,000", change: 5.1 }
];

const news = [
  { title: "Bitcoin gains momentum", sentiment: "positive" },
  { title: "Altcoins under pressure", sentiment: "negative" }
];

const coinContainer = document.getElementById("coins");

coins.forEach(c => {
  const trend = c.change > 0 ? "bullish" : "bearish";

  coinContainer.innerHTML += `
    <div class="coin">
      <h3>${c.name}</h3>
      <p>${c.price}</p>
      <p class="${trend}">${trend.toUpperCase()}</p>
    </div>
  `;
});

const newsContainer = document.getElementById("news");

news.forEach(n => {
  const cls = n.sentiment === "positive" ? "green" : "red";

  newsContainer.innerHTML += `
    <div class="news-item">
      ${n.title}
      <span class="tag ${cls}">
        ${n.sentiment}
      </span>
    </div>
  `;
});
</script>

</body>
</html>
